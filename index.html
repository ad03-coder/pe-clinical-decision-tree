<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PE Decision Tool – AHA 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #1e2837;
      --surface:   #161b22;
      --surface2:  #1e2530;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --accent:    #58a6ff;
      --safe:      #3fb950;
      --warn:      #d29922;
      --danger:    #f85149;
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
      --font-sans: 'DM Sans', sans-serif;
      --font-serif:'DM Serif Display', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-weight: 400;
      line-height: 1.6; min-height: 100svh;
      display: flex; flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 17px;
    }
    .logo-text { font-family: var(--font-serif); font-size: 1.05rem; }
    .logo-sub  { font-size: .7rem; color: var(--muted); margin-top: -2px; }
    .btn-sm {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); padding: 6px 12px; border-radius: var(--radius-sm);
      font-family: var(--font-sans); font-size: .78rem; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--accent); }

    /* ─── PROGRESS ───────────────────────────────────────── */
    #progress-wrap { background: var(--surface2); height: 3px; }
    #progress-bar  { height: 3px; background: var(--accent); transition: width .4s ease; width: 0%; }

    /* ─── MAIN ───────────────────────────────────────────── */
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }

    /* ─── BREADCRUMB ─────────────────────────────────────── */
    #breadcrumb {
      display: flex; flex-wrap: wrap; gap: 4px 6px; align-items: center;
      font-size: .72rem; color: var(--muted); margin-bottom: 20px;
      width: 100%; max-width: 640px;
    }
    .crumb { cursor: pointer; transition: color .15s; }
    .crumb:hover { color: var(--accent); }
    .crumb-sep { opacity: .4; }

    /* ─── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 24px;
      width: 100%; max-width: 640px; box-shadow: var(--shadow);
      animation: cardIn .3s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── COR BADGE ──────────────────────────────────────── */
    .cor-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px; font-size: .68rem;
      font-weight: 600; letter-spacing: .04em; margin-bottom: 12px; border: 1px solid;
    }

    /* ─── CARD TYPOGRAPHY ────────────────────────────────── */
    .card-icon     { font-size: 2rem; margin-bottom: 10px; display: block; }
    .card-title    { font-family: var(--font-serif); font-size: 1.5rem; line-height: 1.2; margin-bottom: 4px; }
    .card-subtitle { font-size: .82rem; color: var(--muted); margin-bottom: 14px; }
    .card-body     { font-size: .92rem; color: #b1bac4; white-space: pre-line; margin-bottom: 20px; line-height: 1.7; }

    /* ─── HINT BOX ───────────────────────────────────────── */
    .hint-box {
      background: rgba(88,166,255,.07); border: 1px solid rgba(88,166,255,.18);
      border-radius: var(--radius-sm); padding: 10px 13px;
      font-size: .78rem; color: #9ec5fb; margin-bottom: 20px; line-height: 1.5;
    }
    .hint-box::before { content: "ℹ  "; font-weight: 700; }

    /* ─── BUTTONS ────────────────────────────────────────── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: var(--accent); color: #0d1117;
      border: none; border-radius: var(--radius-sm); padding: 14px 20px;
      font-family: var(--font-sans); font-weight: 600; font-size: .95rem;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover  { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 20px;
      font-family: var(--font-sans); font-weight: 500; font-size: .92rem;
      cursor: pointer; transition: border-color .15s;
    }
    .btn-secondary:hover { border-color: var(--accent); }

    /* ─── OPTION BUTTONS ─────────────────────────────────── */
    .options-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .option-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px; text-align: left;
      cursor: pointer; transition: border-color .15s, background .15s;
      color: var(--text); font-family: var(--font-sans);
    }
    .option-btn:hover { border-color: var(--accent); background: rgba(88,166,255,.06); }
    .option-label { font-size: .92rem; font-weight: 500; }
    .option-desc  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* ─── SCORE CHECKLIST ────────────────────────────────── */
    .score-description {
      background: rgba(88,166,255,.06); border: 1px solid rgba(88,166,255,.15);
      border-radius: var(--radius-sm); padding: 10px 13px;
      font-size: .82rem; color: #9ec5fb; margin-bottom: 16px; white-space: pre-line;
    }
    .checklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .check-item:hover  { border-color: #4d9fd6; background: rgba(88,166,255,.04); }
    .check-item.checked { border-color: var(--accent); background: rgba(88,166,255,.08); }
    .check-box {
      flex-shrink: 0; width: 20px; height: 20px; border: 2px solid var(--border);
      border-radius: 5px; margin-top: 1px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; transition: background .15s, border-color .15s;
    }
    .check-item.checked .check-box { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .check-label { font-size: .88rem; flex: 1; }
    .check-pts {
      font-size: .78rem; font-weight: 600; color: var(--accent); flex-shrink: 0;
      background: rgba(88,166,255,.1); padding: 2px 7px; border-radius: 4px;
    }

    /* ─── SCORE TOTAL ────────────────────────────────────── */
    .score-total {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px;
    }
    .score-total-label { font-size: .88rem; color: var(--muted); }
    .score-total-value { font-size: 1.8rem; font-family: var(--font-serif); color: var(--accent); }

    /* ─── D-DIMER / AGE INPUT ────────────────────────────── */
    .ddimer-group   { margin-bottom: 16px; }
    .ddimer-label   { font-size: .82rem; color: var(--muted); margin-bottom: 6px; display: block; }
    .ddimer-row     { display: flex; gap: 10px; align-items: center; }
    .ddimer-input, .age-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-sans);
      font-size: 1.05rem; padding: 10px 14px; outline: none; transition: border-color .15s;
    }
    .ddimer-input { flex: 1; }
    .age-input    { width: 100px; }
    .ddimer-input:focus, .age-input:focus { border-color: var(--accent); }
    .ddimer-unit  { font-size: .82rem; color: var(--muted); white-space: nowrap; }
    .ddimer-hint  { font-size: .74rem; color: #9ec5fb; margin-top: 6px; }
    .age-row      { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .age-threshold {
      font-size: .78rem; color: var(--warn); background: rgba(210,153,34,.08);
      border: 1px solid rgba(210,153,34,.2); border-radius: 6px; padding: 5px 10px;
    }

    /* ─── INTERPRETATION TABS ────────────────────────────── */
    .interp-tabs  { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .interp-tab {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; font-size: .78rem; cursor: pointer; color: var(--muted); transition: .15s;
    }
    .interp-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.07); }

    /* ─── RESULT CARD BORDERS ────────────────────────────── */
    .result-safe    { border-color: var(--safe); }
    .result-warning { border-color: var(--warn); }
    .result-danger  { border-color: var(--danger); }

    /* ─── BANNERS ────────────────────────────────────────── */
    .result-banner {
      padding: 12px 16px; border-radius: var(--radius-sm); font-size: .85rem;
      font-weight: 500; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .banner-safe    { background: rgba(63,185,80,.12);  color: var(--safe);   border: 1px solid rgba(63,185,80,.25); }
    .banner-warning { background: rgba(210,153,34,.12); color: var(--warn);   border: 1px solid rgba(210,153,34,.25); }
    .banner-danger  { background: rgba(248,81,73,.12);  color: var(--danger); border: 1px solid rgba(248,81,73,.25); }

    /* ─── NOTE & DISCLAIMER ──────────────────────────────── */
    .note-box {
      background: rgba(210,153,34,.07); border: 1px solid rgba(210,153,34,.2);
      border-radius: var(--radius-sm); padding: 10px 13px;
      font-size: .8rem; color: #d29922; margin-top: 14px;
    }
    .note-box::before { content: "⚠  "; }
    .disclaimer {
      margin-top: 20px; font-size: .72rem; color: var(--muted);
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 13px; line-height: 1.5;
    }

    /* ─── CTPA CHECK ─────────────────────────────────────── */
    .ci-section-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; margin: 18px 0 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .ci-section-label.abs { color: var(--danger); }
    .ci-section-label.rel { color: var(--warn); }
    .ci-section-label.none { color: var(--safe); }

    .ci-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; margin-bottom: 7px;
      transition: border-color .15s, background .15s; user-select: none;
    }
    .ci-item:hover { background: rgba(255,255,255,.03); }
    .ci-item.ci-abs { border-color: var(--danger); background: rgba(248,81,73,.07); }
    .ci-item.ci-rel { border-color: var(--warn);   background: rgba(210,153,34,.07); }
    .ci-item.ci-none-checked { border-color: var(--safe); background: rgba(63,185,80,.08); }
    .ci-box {
      flex-shrink: 0; width: 20px; height: 20px; border: 2px solid var(--border);
      border-radius: 5px; margin-top: 1px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; transition: background .15s, border-color .15s;
    }
    .ci-item.ci-abs .ci-box { background: var(--danger); border-color: var(--danger); color: #fff; }
    .ci-item.ci-rel .ci-box { background: var(--warn);   border-color: var(--warn);   color: #fff; }
    .ci-item.ci-none-checked .ci-box { background: var(--safe); border-color: var(--safe); color: #fff; }

    /* CTPA OK banner */
    .ctpa-ok {
      display: flex; align-items: center; gap: 10px; padding: 14px 16px;
      background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3);
      border-radius: var(--radius-sm); color: var(--safe);
      font-size: .9rem; font-weight: 600; margin: 16px 0;
    }

    /* Alternative cards */
    .alt-section-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin: 20px 0 8px;
    }
    .alt-card {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 13px 15px; margin-bottom: 9px; background: var(--surface2);
    }
    .alt-card.best { border-color: var(--accent); background: rgba(88,166,255,.07); }
    .alt-header {
      display: flex; align-items: center; gap: 8px;
      font-size: .92rem; font-weight: 600; margin-bottom: 5px;
    }
    .alt-best-badge {
      margin-left: auto; font-size: .67rem; background: rgba(88,166,255,.15);
      color: var(--accent); border: 1px solid rgba(88,166,255,.25);
      border-radius: 10px; padding: 2px 8px; white-space: nowrap;
    }
    .alt-desc { font-size: .8rem; color: var(--muted); line-height: 1.5; }
    .alt-card[onclick] { transition: border-color .15s, background .15s; }
    .alt-card[onclick]:hover { border-color: var(--accent); background: rgba(88,166,255,.07); }
    .alt-cta { margin-top: 10px; font-size: .8rem; font-weight: 600; color: var(--accent); }
    .alt-subitems { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
    .alt-subitem {
      font-size: .77rem; color: #9ec5fb;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .alt-subitem::before { content: "→"; flex-shrink: 0; opacity: .6; }

    /* Echo table (inside alt-card) */
    .echo-toggle {
      display: flex; align-items: center; gap: 6px; font-size: .8rem;
      color: var(--accent); cursor: pointer; background: none; border: none;
      font-family: var(--font-sans); padding: 0; margin-top: 10px;
    }
    .echo-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: .76rem; min-width: 380px; }
    th, td { padding: 8px 11px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--surface2); color: var(--muted); font-weight: 600; font-size: .7rem; text-transform: uppercase; letter-spacing: .04em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer { text-align: center; padding: 16px; font-size: .7rem; color: var(--muted); border-top: 1px solid var(--border); }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .card-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🫁</div>
    <div>
      <div class="logo-text">PE Decision Tool</div>
      <div class="logo-sub">AHA Guidelines 2026 - ESC Guideline 2019</div>
    </div>
  </div>
  <button class="btn-sm" onclick="resetApp()">↺ Riavvia</button>
</header>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<main>
  <div id="breadcrumb"></div>
  <div id="content"></div>
</main>

<footer>
  Strumento di supporto decisionale – Non sostituisce il giudizio clinico del medico.<br>
  Fonte: AHA 2026 Adults With Acute Pulmonary Embolism © 2026 American Heart Association
</footer>

<script src="decision_tree.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let history  = [];
let scores   = {};   // { nodeId: { items:{id:bool}, total:num, interpIdx:num } }
let ddimers  = {};   // { nodeId: { value:num, age:num } }
let ctpaState= {};   // { ci_id: bool }

const TOTAL_STEPS = 7;

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function goTo(nodeId) {
  if (!PE_DECISION_TREE[nodeId]) { console.error("Node not found:", nodeId); return; }
  // Reset ctpa state each time we enter a ctpa_check-type node
  if (PE_DECISION_TREE[nodeId].type === "ctpa_check") ctpaState = {};
  history.push(nodeId);
  render(nodeId);
}

function goBack() {
  if (history.length <= 1) return;
  history.pop();
  render(history[history.length - 1]);
}

function resetApp() {
  history = []; scores = {}; ddimers = {}; ctpaState = {};
  goTo("start");
}

function jumpTo(idx) {
  history = history.slice(0, idx + 1);
  const lastId = history[history.length - 1];
  if (PE_DECISION_TREE[lastId]?.type === "ctpa_check") ctpaState = {};
  render(lastId);
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS & BREADCRUMB
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  const pct = Math.min((history.length / TOTAL_STEPS) * 100, 100);
  document.getElementById("progress-bar").style.width = pct + "%";
}

const NODE_LABELS = {
  start:"Inizio", choose_guideline:"Linee Guida", symptoms_check:"H&P", choose_score:"Scegli Score",
  wells_score:"Wells", geneva_score:"Geneva", geneva_simple_score:"Geneva Sempl.",
  perc_check:"PERC", ddimer_years:"D-Dimero+YEARS",
  diagnostic_imaging_direct:"Imaging (Alta prob.)", diagnostic_imaging:"Imaging",
  ctpa_check:"Scelta Imaging", result_very_low_prob:"PE improbabile", result_pe_excluded:"PE esclusa",
  // ESC 2019
  esc_hemodynamic_check:"Instabilità Emod.", esc_bedside_tte:"TTE Bedside",
  esc_rv_dysfunction:"Disfunzione RV", esc_search_other_causes_1:"Altre Cause",
  esc_ctpa_feasible:"Scelta Imaging", esc_ctpa_result:"Esito CTPA",
  esc_treat_high_risk_bedside:"Tratt. Alto Rischio", esc_treat_high_risk:"Tratt. Alto Rischio",
  esc_search_other_causes_2:"Altre Cause", esc_geneva_score:"Geneva (ESC)",
  esc_ddimer_test:"D-Dimero (ESC)",
  esc_ctpa_low_intermediate:"Scelta Imaging", esc_ctpa_result_low_intermediate:"Esito CTPA",
  esc_vq_result_low_intermediate:"Esito V/Q", esc_echo_result_low_intermediate:"Esito Ecografia",
  esc_ctpa_no_dimer:"Scelta Imaging", esc_ctpa_result_no_dimer:"Esito CTPA",
  esc_vq_result_no_dimer:"Esito V/Q", esc_echo_result_no_dimer:"Esito Ecografia",
  esc_inconclusive_imaging:"Imaging Non Diagn.",
  esc_no_pe_high_probability:"CTPA Neg./Alta Prob.",
  esc_pe_excluded:"PE Esclusa", esc_no_treatment:"PE Esclusa", esc_treatment_indicated:"PE Confermata"
};

function renderBreadcrumb() {
  const el = document.getElementById("breadcrumb");
  if (history.length <= 1) { el.innerHTML = ""; return; }
  el.innerHTML = history.map((id, i) => {
    const label = NODE_LABELS[id] || id;
    return i === history.length - 1
      ? `<span style="color:var(--text)">${label}</span>`
      : `<span class="crumb" onclick="jumpTo(${i})">${label}</span>`;
  }).join('<span class="crumb-sep">›</span>');
}

/* ═══════════════════════════════════════════════════════════════
   COR BADGE
   ═══════════════════════════════════════════════════════════════ */
function corBadge(cor, color) {
  if (!cor) return "";
  return `<div class="cor-badge" style="color:${color};border-color:${color}30;background:${color}12">
    <span>●</span><span>${cor}</span></div>`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER DISPATCHER
   ═══════════════════════════════════════════════════════════════ */
function render(nodeId) {
  updateProgress();
  renderBreadcrumb();
  const node = PE_DECISION_TREE[nodeId];
  const el   = document.getElementById("content");
  el.innerHTML = "";
  const card = {
    info:       renderInfo,
    question:   renderQuestion,
    score:      renderScore,
    result:     renderResult,
    ctpa_check: renderCtpaCheck
  }[node.type]?.(node);
  if (card) el.appendChild(card);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ═══════════════════════════════════════════════════════════════
   INFO NODE
   ═══════════════════════════════════════════════════════════════ */
function renderInfo(node) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    ${corBadge(node.cor, node.cor_color)}
    <span class="card-icon">${node.icon||""}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    <p class="card-body">${node.body}</p>
    ${node.hint ? `<div class="hint-box">${node.hint}</div>` : ""}
    <button class="btn-primary" onclick="goTo('${node.next}')">Continua →</button>
    ${history.length > 1 ? `<button class="btn-secondary" style="margin-top:10px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

/* ═══════════════════════════════════════════════════════════════
   QUESTION NODE
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion(node) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <span class="card-icon">${node.icon||"🔀"}</span>
    <h1 class="card-title">${node.title}</h1>
    <p class="card-body">${node.body}</p>
    <div class="options-grid">
      ${node.options.map(o => `
        <button class="option-btn" onclick="goTo('${o.next}')">
          <div class="option-label">${o.label}</div>
          ${o.desc ? `<div class="option-desc">${o.desc}</div>` : ""}
        </button>`).join("")}
    </div>
    ${history.length > 1 ? `<button class="btn-secondary" style="margin-top:14px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

/* ═══════════════════════════════════════════════════════════════
   SCORE NODE
   ═══════════════════════════════════════════════════════════════ */
function renderScore(node) {
  const nid = node.id;
  if (!scores[nid]) scores[nid] = { items:{}, total:0, interpIdx:0 };
  const state = scores[nid];
  const isPERC = node.scoreType === "perc";
  const isYEARS = node.scoreType === "years";

  // Interpretation tabs
  let tabsHtml = "";
  if (node.interpretation?.length > 1) {
    tabsHtml = `<div class="interp-tabs">` +
      node.interpretation.map((t, i) =>
        `<button class="interp-tab${i===state.interpIdx?" active":""}" onclick="setInterpIdx('${nid}',${i})">${t.label}</button>`
      ).join("") + `</div>`;
  }

  // Checklist
  const checkHtml = node.items.map(item => {
    const checked = !!state.items[item.id];
    return `
      <div class="check-item${checked?" checked":""}" onclick="toggleItem('${nid}','${item.id}',${item.points})">
        <div class="check-box">${checked?"✓":""}</div>
        <span class="check-label">${item.label}</span>
        ${isPERC ? "" : `<span class="check-pts">+${item.points}</span>`}
      </div>`;
  }).join("");

  // D-Dimer input (YEARS only) – uses onchange/oninput without full re-render
  let ddimerHtml = "";
  if (node.ddimer_input) {
    const dd  = ddimers[nid] || {};
    const age = dd.age   || "";
    const val = dd.value !== undefined ? dd.value : "";
    const ageThreshold = age >= 50 ? `Soglia age-adjusted: ${age*10} µg/L` :
                         age > 0   ? `Soglia standard: 500 µg/L` : "";
    ddimerHtml = `
      <div class="ddimer-group">
        <label class="ddimer-label">Età paziente (per soglia age-adjusted)</label>
        <div class="age-row">
          <input class="age-input" id="age-input-${nid}" type="number" min="18" max="120"
            placeholder="anni" value="${age}" oninput="updateDdimerLive('${nid}')"/>
          <span class="age-threshold" id="age-threshold-${nid}">${ageThreshold?"⟹ "+ageThreshold:""}</span>
        </div>
        <label class="ddimer-label">Valore D-Dimero</label>
        <div class="ddimer-row">
          <input class="ddimer-input" id="ddimer-val-${nid}" type="number" min="0"
            placeholder="es. 450" value="${val}" oninput="updateDdimerLive('${nid}')"/>
          <span class="ddimer-unit">ng/mL (µg/L)</span>
        </div>
        ${node.hint_age_adjusted ? `<div class="ddimer-hint">ℹ ${node.hint_age_adjusted}</div>` : ""}
        <div id="ddimer-result-${nid}"></div>
      </div>`;
  }

  // Interpretation result (non-YEARS only; YEARS handled live)
  let interpHtml = "";
  if (!isYEARS) {
    const result = getScoreResult(node, state, nid);
    if (result) {
      const sev = getSeverity(result.next);
      interpHtml = `<div class="result-banner banner-${sev}" style="margin-top:4px">
        <span>${sevIcon(sev)}</span><span>${result.category}</span></div>`;
    }
  }

  const canGo = canSubmit(node, state, nid);
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    ${corBadge(node.cor, node.cor_color)}
    <span class="card-icon">${node.icon||"📋"}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    ${node.description ? `<div class="score-description">${node.description}</div>` : ""}
    ${tabsHtml}
    <div class="checklist">${checkHtml}</div>
    <div class="score-total">
      <span class="score-total-label">${isPERC?"Criteri presenti (fattori di rischio)":"Punteggio totale"}</span>
      <span class="score-total-value">${state.total}</span>
    </div>
    ${ddimerHtml}
    ${interpHtml}
    <button class="btn-primary" id="continue-btn-${nid}"
      onclick="submitScore('${nid}')" ${canGo?"":"disabled"}>
      Conferma e Continua →
    </button>
    ${history.length > 1 ? `<button class="btn-secondary" style="margin-top:10px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

function toggleItem(nid, itemId, pts) {
  const s = scores[nid];
  if (s.items[itemId]) { delete s.items[itemId]; s.total = Math.max(0, s.total - pts); }
  else                 { s.items[itemId] = true;  s.total += pts; }
  render(history[history.length-1]);
}

function setInterpIdx(nid, idx) {
  scores[nid].interpIdx = idx;
  render(history[history.length-1]);
}

/* D-Dimer live update – updates only the result badge & age threshold, no full re-render */
function updateDdimerLive(nid) {
  const ageEl = document.getElementById("age-input-" + nid);
  const valEl = document.getElementById("ddimer-val-" + nid);
  if (!ageEl || !valEl) return;

  const age  = parseFloat(ageEl.value) || 0;
  const dval = parseFloat(valEl.value);

  if (!ddimers[nid]) ddimers[nid] = {};
  ddimers[nid].age   = age;
  ddimers[nid].value = isNaN(dval) ? undefined : dval;

  // Update age-threshold badge
  const thEl = document.getElementById("age-threshold-" + nid);
  if (thEl) {
    if      (age >= 50) thEl.textContent = "⟹ Soglia age-adjusted: " + (age*10) + " µg/L";
    else if (age >  0)  thEl.textContent = "⟹ Soglia standard: 500 µg/L";
    else                thEl.textContent = "";
  }

  // Update result preview badge
  const resEl = document.getElementById("ddimer-result-" + nid);
  const btn   = document.getElementById("continue-btn-" + nid);
  const node  = PE_DECISION_TREE[nid];
  const state = scores[nid] || { items:{}, total:0, interpIdx:0 };
  const ok    = canSubmit(node, state, nid);
  if (btn) btn.disabled = !ok;
  if (!resEl) return;

  const result = getScoreResult(node, state, nid);
  if (!result) { resEl.innerHTML = ""; return; }
  const sev = getSeverity(result.next);
  resEl.innerHTML = `<div class="result-banner banner-${sev}" style="margin-top:8px">
    <span>${sevIcon(sev)}</span><span>${result.category}</span></div>`;
}

function canSubmit(node, state, nid) {
  if (!node.ddimer_input) return true;
  const ageEl = document.getElementById("age-input-" + nid);
  const valEl = document.getElementById("ddimer-val-" + nid);
  const age  = ageEl ? parseFloat(ageEl.value) : (ddimers[nid]||{}).age;
  const dval = valEl ? parseFloat(valEl.value) : (ddimers[nid]||{}).value;
  return age > 0 && !isNaN(dval) && dval >= 0;
}

function submitScore(nid) {
  const node  = PE_DECISION_TREE[nid];
  const state = scores[nid];
  // Sync live inputs
  if (node.ddimer_input) {
    const ageEl = document.getElementById("age-input-" + nid);
    const valEl = document.getElementById("ddimer-val-" + nid);
    if (!ddimers[nid]) ddimers[nid] = {};
    if (ageEl) ddimers[nid].age   = parseFloat(ageEl.value) || 0;
    if (valEl) ddimers[nid].value = parseFloat(valEl.value);
  }
  if (!canSubmit(node, state, nid)) { alert("Inserisci età e valore D-Dimero per procedere."); return; }
  const result = getScoreResult(node, state, nid);
  if (!result) { alert("Completa la valutazione per procedere."); return; }
  goTo(result.next);
}

/* Score result calculation */
function getScoreResult(node, state, nid) {
  if (!node.interpretation) return null;
  const interp = node.interpretation[state.interpIdx];
  if (!interp) return null;

  if (node.scoreType === "years") {
    const dd  = ddimers[nid] || {};
    const dval = dd.value || 0;
    const age  = dd.age   || 0;
    const ageThreshold = age > 0 ? (age < 50 ? 500 : age * 10) : 500;
    const yearsCount = state.total;
    for (const rule of interp.rules) {
      const yOk = (rule.years === 0 && yearsCount === 0) || (rule.years === ">=1" && yearsCount >= 1);
      if (!yOk) continue;
      const threshold = rule.ddimer_val === 500 ? Math.min(500, ageThreshold) : rule.ddimer_val;
      const dOk = (rule.ddimer_op === "<"  && dval <  threshold) ||
                  (rule.ddimer_op === ">=" && dval >= threshold);
      if (dOk) return rule;
    }
    return null;
  }
  // Standard range
  for (const rule of interp.rules) {
    if (state.total >= rule.range[0] && state.total <= rule.range[1]) return rule;
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════════
   RESULT NODE
   ═══════════════════════════════════════════════════════════════ */
function renderResult(node) {
  const card = document.createElement("div");
  card.className = `card result-${node.severity}`;
  const banner = { safe:"Probabilità molto bassa / PE esclusa", warning:"Test necessari – procedere con imaging", danger:"Alta probabilità – eseguire imaging urgente" };
  card.innerHTML = `
    ${corBadge(node.cor, node.cor_color)}
    <span class="card-icon">${node.icon||""}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    <div class="result-banner banner-${node.severity}">
      <span>${sevIcon(node.severity)}</span><span>${banner[node.severity]}</span>
    </div>
    <p class="card-body">${node.body}</p>
    ${node.note ? `<div class="note-box">${node.note}</div>` : ""}
    <div class="disclaimer">
      ${TREE_METADATA.disclaimer}<br>
      <strong>Fonte:</strong> ${TREE_METADATA.source} · ${TREE_METADATA.author}
    </div>
    ${node.next
      ? `<button class="btn-primary" style="margin-top:18px" onclick="goTo('${node.next}')">
           Verifica Controindicazioni CTPA →</button>`
      : ""}
    <button class="btn-secondary" style="margin-top:${node.next?"10px":"18px"}" onclick="resetApp()">↺ Nuova Valutazione</button>
    <button class="btn-secondary" style="margin-top:8px" onclick="goBack()">← Indietro</button>
  `;
  return card;
}

/* ═══════════════════════════════════════════════════════════════
   CTPA CHECK NODE
   ═══════════════════════════════════════════════════════════════ */
function renderCtpaCheck(node) {
  const card = document.createElement("div");
  card.className = "card";
  card.id = "ctpa-card";
  card.dataset.nodeId = node.id;
  card.innerHTML = buildCtpaHtml(node);
  return card;
}

function buildCtpaHtml(node) {
  const { absolute, relative } = node.contraindications;
  const noneOpt = node.no_contraindications_option;
  const noneChecked = !!ctpaState[noneOpt.id];

  const checkedIds = Object.keys(ctpaState).filter(k => ctpaState[k] && k !== noneOpt.id);
  const hasAny = checkedIds.length > 0;

  const absItems = absolute.map(ci => {
    const on = !!ctpaState[ci.id];
    return `<div class="ci-item${on?" ci-abs":""}" onclick="toggleCi('${node.id}','${ci.id}')">
      <div class="ci-box">${on?"✓":""}</div>
      <span style="font-size:.88rem">${ci.label}</span></div>`;
  }).join("");

  const relItems = relative.map(ci => {
    const on = !!ctpaState[ci.id];
    return `<div class="ci-item${on?" ci-rel":""}" onclick="toggleCi('${node.id}','${ci.id}')">
      <div class="ci-box">${on?"✓":""}</div>
      <span style="font-size:.88rem">${ci.label}</span></div>`;
  }).join("");

  // "Nessuna controindicazione" – option separata, mutuamente esclusiva
  const noneItem = `
    <div class="ci-item ci-none${noneChecked?" ci-none-checked":""}" onclick="toggleNoneCi('${node.id}')">
      <div class="ci-box">${noneChecked?"✓":""}</div>
      <span style="font-size:.88rem;font-weight:600">${noneOpt.label}</span>
    </div>`;

  // Status banner
  let statusHtml = "";
  if (noneChecked) {
    statusHtml = `<div class="ctpa-ok">✅ Confermato: nessuna controindicazione — procedere con CTPA</div>`;
  } else if (hasAny) {
    statusHtml = `<div class="result-banner banner-warning" style="margin-top:12px">
        🟡 CTPA controindicata o non disponibile – seleziona un'alternativa</div>`;
  }

  // Helper: render a clickable alternative card if it declares its own `next`,
  // otherwise a static (non-navigable) card — preserves old AHA ctpa_check behavior.
  const renderAltCard = (a, isBest) => {
    const subHtml = a.subitems
      ? `<div class="alt-subitems">${a.subitems.map(s=>`<div class="alt-subitem">${s}</div>`).join("")}</div>`
      : "";
    const echoHtml = a.id === "alt_echo" || a.id === "alt_echo_esc" ? `
      <button class="echo-toggle" onclick="toggleEcho(this)">▸ Parametri ecocardiografici disfunzione RV</button>
      <div class="echo-table-wrap" style="display:none">
        <table><thead><tr><th>Parametro</th><th>Tecnica</th><th>Soglia</th></tr></thead>
        <tbody>${ECHO_RV_TABLE.map(r=>`<tr>
          <td><strong>${r.parameter}</strong></td>
          <td>${r.technique}</td>
          <td>${r.definition}</td></tr>`).join("")}
        </tbody></table></div>` : "";
    const clickable = !!a.next;
    const clickAttr = clickable ? ` onclick="goTo('${a.next}')" style="cursor:pointer"` : "";
    const cta = clickable ? `<div class="alt-cta">Continua →</div>` : "";
    return `<div class="alt-card${isBest?" best":""}"${clickAttr}>
      <div class="alt-header">
        <span>${a.icon}</span><span>${a.label}</span>
        ${isBest?`<span class="alt-best-badge">✦ Consigliata</span>`:""}
      </div>
      <div class="alt-desc">${a.desc}</div>
      ${subHtml}${echoHtml}${cta}
    </div>`;
  };

  // Alternatives — shown for hasAny (ranked by relevance) OR for noneChecked (CTPA highlighted)
  let altHtml = "";
  const ctpaAltId = node.alternatives.find(a => a.best_for.includes(noneOpt.id))?.id;
  if (noneChecked) {
    const ctpaAlt = node.alternatives.find(a => a.id === ctpaAltId);
    if (ctpaAlt) {
      altHtml = `<div class="alt-section-label">Modalità raccomandata</div>${renderAltCard(ctpaAlt, true)}`;
    }
  } else if (hasAny) {
    const ranked = node.alternatives
      .filter(a => a.id !== ctpaAltId)
      .map(a => ({ ...a, score: a.best_for.filter(id => checkedIds.includes(id)).length }))
      .filter(a => a.score > 0)
      .sort((a, b) => b.score - a.score);

    if (ranked.length) {
      const topScore = ranked[0].score;
      const cards = ranked.map(a => renderAltCard(a, a.score === topScore)).join("");
      altHtml = `<div class="alt-section-label">Alternative consigliate in base alle controindicazioni selezionate</div>${cards}`;
    }
  }

  return `
    <span class="card-icon">${node.icon}</span>
    <h1 class="card-title">${node.title}</h1>
    <p class="card-subtitle">${node.subtitle}</p>
    <div class="hint-box">Seleziona le controindicazioni presenti, oppure confermi che non ce ne sono per procedere con CTPA.</div>
    <div class="ci-section-label abs">⬤ Controindicazioni Assolute</div>
    ${absItems}
    <div class="ci-section-label rel">⬤ Controindicazioni Relative</div>
    ${relItems}
    <div class="ci-section-label none">⬤ Nessuna controindicazione</div>
    ${noneItem}
    ${statusHtml}
    ${altHtml}
    <div class="disclaimer" style="margin-top:16px">
      ${TREE_METADATA.disclaimer}<br>
      <strong>Fonte:</strong> ${TREE_METADATA.source} · ${TREE_METADATA.author}
    </div>
    <button class="btn-secondary" style="margin-top:16px" onclick="resetApp()">↺ Nuova Valutazione</button>
    <button class="btn-secondary" style="margin-top:8px" onclick="goBack()">← Indietro</button>
  `;
}

function toggleCi(nodeId, id) {
  // Selecting any contraindication clears the "nessuna" option (mutual exclusivity)
  const node = PE_DECISION_TREE[nodeId];
  const noneId = node.no_contraindications_option.id;
  ctpaState[noneId] = false;
  ctpaState[id] = !ctpaState[id];
  const card = document.getElementById("ctpa-card");
  if (card) card.innerHTML = buildCtpaHtml(node);
}

function toggleNoneCi(nodeId) {
  const node = PE_DECISION_TREE[nodeId];
  const noneId = node.no_contraindications_option.id;
  const turningOn = !ctpaState[noneId];
  // Selecting "nessuna" clears all other contraindication checkboxes (mutual exclusivity)
  if (turningOn) {
    Object.keys(ctpaState).forEach(k => { if (k !== noneId) ctpaState[k] = false; });
  }
  ctpaState[noneId] = turningOn;
  const card = document.getElementById("ctpa-card");
  if (card) card.innerHTML = buildCtpaHtml(node);
}

function toggleEcho(btn) {
  const wrap = btn.nextElementSibling;
  const open = wrap.style.display !== "none";
  wrap.style.display = open ? "none" : "block";
  btn.textContent = (open ? "▸" : "▾") + " Parametri ecocardiografici disfunzione RV";
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function getSeverity(nextNode) {
  if (!nextNode) return "warning";
  if (nextNode === "result_very_low_prob" || nextNode === "result_pe_excluded") return "safe";
  if (nextNode === "diagnostic_imaging_direct") return "danger";
  return "warning";
}
function sevIcon(sev) {
  return { safe:"✅", warning:"🔶", danger:"🔴" }[sev] || "🔶";
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════ */
goTo("start");
</script>
