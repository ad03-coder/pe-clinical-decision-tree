<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PE Decision Tool – AHA 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────── */
   /*
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1e2530;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --accent:    #58a6ff;
      --safe:      #3fb950;
      --warn:      #d29922;
      --danger:    #f85149;
      --cor1:      #22c55e;
      --cor2a:     #eab308;
      --cor2b:     #f97316;
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
      --font-sans: 'DM Sans', sans-serif;
      --font-serif:'DM Serif Display', serif;
    }
      */

    :root {
  --bg:        #1a2a35;   /* azzurro-grigio scuro, non blu notte */
  --surface:   #223544;   /* più chiaro e più azzurro */
  --surface2:  #2b4152;   /* pannelli secondari */
  --border:    #3f5a6b;   /* azzurro-grigio */
  --text:      #e9f4ff;   /* bianco-azzurro */
  --muted:     #a8c0d4;   /* azzurro pallido */

  --accent:    #6ecbff;   /* azzurro brillante */
  --safe:      #4ddc9a;   /* verde acqua */
  --warn:      #ffd86b;   /* giallo caldo ma chiaro */
  --danger:    #ff7b7b;   /* rosso corallo */
  
  --cor1:      #5cf2a5;   /* verde acqua chiaro */
  --cor2a:     #ffe066;   /* giallo pastello */
  --cor2b:     #ff9f5f;   /* arancio pesca */

  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 4px 24px rgba(0,0,0,.30);
  --font-sans: 'DM Sans', sans-serif;
  --font-serif:'DM Serif Display', serif;
}


    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.6;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .logo-text { font-family: var(--font-serif); font-size: 1.05rem; color: var(--text); }
    .logo-sub  { font-size: .7rem; color: var(--muted); margin-top: -2px; }
    .header-actions { display: flex; gap: 8px; }
    .btn-sm {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: .78rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--accent); }

    /* ─── PROGRESS BAR ───────────────────────────────────── */
    #progress-wrap {
      background: var(--surface2);
      height: 3px;
    }
    #progress-bar {
      height: 3px;
      background: var(--accent);
      transition: width .4s ease;
      width: 0%;
    }

    /* ─── MAIN LAYOUT ────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    /* ─── BREADCRUMB ─────────────────────────────────────── */
    #breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      align-items: center;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 20px;
      width: 100%;
      max-width: 640px;
    }
    .crumb {
      cursor: pointer;
      transition: color .15s;
    }
    .crumb:hover { color: var(--accent); }
    .crumb-sep { opacity: .4; }

    /* ─── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 640px;
      box-shadow: var(--shadow);
      animation: cardIn .3s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── COR BADGE ──────────────────────────────────────── */
    .cor-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: 12px;
      border: 1px solid;
    }

    /* ─── CARD HEADER ────────────────────────────────────── */
    .card-icon  { font-size: 2rem; margin-bottom: 10px; display: block; }
    .card-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .card-body {
      font-size: .92rem;
      color: #b1bac4;
      white-space: pre-line;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    /* ─── HINT BOX ───────────────────────────────────────── */
    .hint-box {
      background: rgba(88,166,255,.07);
      border: 1px solid rgba(88,166,255,.18);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: .78rem;
      color: #9ec5fb;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .hint-box::before { content: "ℹ  "; font-weight: 700; }

    /* ─── ACTION BUTTON ──────────────────────────────────── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover  { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    /* ─── OPTION BUTTONS ─────────────────────────────────── */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .option-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      color: var(--text);
      font-family: var(--font-sans);
    }
    .option-btn:hover {
      border-color: var(--accent);
      background: rgba(88,166,255,.06);
    }
    .option-label { font-size: .92rem; font-weight: 500; }
    .option-desc  { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* ─── SCORE CHECKLIST ────────────────────────────────── */
    .score-description {
      font-size: .82rem;
      color: #9ec5fb;
      background: rgba(88,166,255,.06);
      border: 1px solid rgba(88,166,255,.15);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      margin-bottom: 16px;
      white-space: pre-line;
    }
    .checklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .check-item:hover { border-color: #4d9fd6; background: rgba(88,166,255,.04); }
    .check-item.checked {
      border-color: var(--accent);
      background: rgba(88,166,255,.08);
    }
    .check-box {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
      font-size: 12px;
    }
    .check-item.checked .check-box {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
    }
    .check-label { font-size: .88rem; flex: 1; }
    .check-pts   {
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
      background: rgba(88,166,255,.1);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* ─── SCORE TOTAL ────────────────────────────────────── */
    .score-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .score-total-label { font-size: .88rem; color: var(--muted); }
    .score-total-value { font-size: 1.8rem; font-family: var(--font-serif); color: var(--accent); }

    /* ─── DDIMER INPUT ────────────────────────────────────── */
    .ddimer-group { margin-bottom: 16px; }
    .ddimer-label { font-size: .82rem; color: var(--muted); margin-bottom: 6px; display: block; }
    .ddimer-row   { display: flex; gap: 10px; align-items: center; }
    .ddimer-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 1.1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
    }
    .ddimer-input:focus { border-color: var(--accent); }
    .ddimer-unit {
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .ddimer-hint {
      font-size: .74rem;
      color: #9ec5fb;
      margin-top: 6px;
    }
    .age-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .age-input {
      width: 90px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 1rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .age-input:focus { border-color: var(--accent); }
    .age-threshold {
      font-size: .8rem;
      color: var(--warn);
      background: rgba(210,153,34,.08);
      border: 1px solid rgba(210,153,34,.2);
      border-radius: 6px;
      padding: 5px 10px;
    }

    /* ─── INTERPRETATION SELECTOR ────────────────────────── */
    .interp-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .interp-tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      color: var(--muted);
      transition: .15s;
    }
    .interp-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,.07);
    }

    /* ─── RESULT CARD ────────────────────────────────────── */
    .result-safe    { border-color: var(--safe); }
    .result-warning { border-color: var(--warn); }
    .result-danger  { border-color: var(--danger); }

    .result-banner {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .banner-safe    { background: rgba(63,185,80,.12); color: #3fb950; border: 1px solid rgba(63,185,80,.25); }
    .banner-warning { background: rgba(210,153,34,.12); color: #d29922; border: 1px solid rgba(210,153,34,.25); }
    .banner-danger  { background: rgba(248,81,73,.12);  color: #f85149; border: 1px solid rgba(248,81,73,.25); }

    .reco-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .reco-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
    }
    .reco-item.primary { border-color: var(--accent); background: rgba(88,166,255,.06); }
    .reco-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .dot-primary { background: var(--accent); }
    .dot-alt     { background: var(--muted); }
    .reco-name { font-size: .9rem; font-weight: 500; }
    .reco-desc { font-size: .77rem; color: var(--muted); margin-top: 2px; }

    /* ─── ECHO TABLE ─────────────────────────────────────── */
    .echo-section { margin-top: 20px; }
    .echo-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .82rem;
      color: var(--accent);
      cursor: pointer;
      margin-bottom: 8px;
      background: none;
      border: none;
      font-family: var(--font-sans);
      padding: 0;
    }
    .echo-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .78rem;
      min-width: 420px;
    }
    th, td {
      padding: 9px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* ─── DISCLAIMER ─────────────────────────────────────── */
    .disclaimer {
      margin-top: 20px;
      font-size: .72rem;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      line-height: 1.5;
    }

    /* ─── NOTE CARD ──────────────────────────────────────── */
    .note-box {
      background: rgba(210,153,34,.07);
      border: 1px solid rgba(210,153,34,.2);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: .8rem;
      color: #d29922;
      margin-top: 14px;
    }
    .note-box::before { content: "⚠  "; }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: .7rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .card-title { font-size: 1.3rem; }
      .interp-tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🫁</div>
    <div>
      <div class="logo-text">PE Decision Tool</div>
      <div class="logo-sub">AHA Guidelines 2026 </div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-sm" onclick="resetApp()">↺ Riavvia</button>
  </div>
</header>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<main>
  <div id="breadcrumb"></div>
  <div id="content"></div>
</main>

<footer>
  Strumento di supporto decisionale – Non sostituisce il giudizio clinico del medico.<br>
  Fonte: AHA 2026 Adults With Acute Pulmonary Embolism © 2026 American Heart Association
</footer>

<!-- Load decision tree logic -->
<script src="decision_tree.js"></script>

<script>
/* ──────────────────────────────────────────────────────────────
   APP STATE
   ────────────────────────────────────────────────────────────── */
let history  = [];   // stack of nodeId strings
let scores   = {};   // { nodeId: { items: {id: checked}, total, interpIdx } }
let ddimers  = {};   // { nodeId: { value, age } }

const TOTAL_STEPS = 6;

/* ──────────────────────────────────────────────────────────────
   NAVIGATION
   ────────────────────────────────────────────────────────────── */
function goTo(nodeId) {
  if (!PE_DECISION_TREE[nodeId]) {
    console.error("Node not found:", nodeId);
    return;
  }
  history.push(nodeId);
  render(nodeId);
}

function goBack() {
  if (history.length <= 1) return;
  history.pop();
  render(history[history.length - 1]);
}

function resetApp() {
  history  = [];
  scores   = {};
  ddimers  = {};
  goTo("start");
}

/* ──────────────────────────────────────────────────────────────
   PROGRESS
   ────────────────────────────────────────────────────────────── */
function updateProgress() {
  const pct = Math.min((history.length / TOTAL_STEPS) * 100, 100);
  document.getElementById("progress-bar").style.width = pct + "%";
}

/* ──────────────────────────────────────────────────────────────
   BREADCRUMB
   ────────────────────────────────────────────────────────────── */
const NODE_LABELS = {
  start:                     "Inizio",
  symptoms_check:            "H&P",
  choose_score:              "Scegli Score",
  wells_score:               "Wells Score",
  geneva_score:              "Geneva Score",
  geneva_simple_score:       "Geneva Semplificato",
  perc_check:                "PERC",
  ddimer_years:              "D-Dimero + YEARS",
  diagnostic_imaging_direct: "Imaging (Alta prob.)",
  diagnostic_imaging:        "Imaging",
  result_very_low_prob:      "PE molto improbabile",
  result_pe_excluded:        "PE esclusa"
};

function renderBreadcrumb() {
  const el = document.getElementById("breadcrumb");
  if (history.length <= 1) { el.innerHTML = ""; return; }
  const crumbs = history.map((id, i) => {
    const label = NODE_LABELS[id] || id;
    if (i === history.length - 1)
      return `<span style="color:var(--text)">${label}</span>`;
    return `<span class="crumb" onclick="jumpTo(${i})">${label}</span>`;
  });
  el.innerHTML = crumbs.join('<span class="crumb-sep">›</span>');
}

function jumpTo(idx) {
  history = history.slice(0, idx + 1);
  render(history[history.length - 1]);
}

/* ──────────────────────────────────────────────────────────────
   COR BADGE HTML
   ────────────────────────────────────────────────────────────── */
function corBadge(cor, color) {
  if (!cor) return "";
  const c = color || "#9ca3af";
  return `<div class="cor-badge" style="color:${c};border-color:${c}30;background:${c}12">
    <span>●</span><span>${cor}</span>
  </div>`;
}

/* ──────────────────────────────────────────────────────────────
   RENDER DISPATCHER
   ────────────────────────────────────────────────────────────── */
function render(nodeId) {
  updateProgress();
  renderBreadcrumb();
  const node = PE_DECISION_TREE[nodeId];
  const el = document.getElementById("content");
  el.innerHTML = "";

  switch (node.type) {
    case "info":     el.appendChild(renderInfo(node));    break;
    case "question": el.appendChild(renderQuestion(node)); break;
    case "score":    el.appendChild(renderScore(node));   break;
    case "result":   el.appendChild(renderResult(node));  break;
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ──────────────────────────────────────────────────────────────
   INFO NODE
   ────────────────────────────────────────────────────────────── */
function renderInfo(node) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    ${corBadge(node.cor, node.cor_color)}
    <span class="card-icon">${node.icon || ""}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    <p class="card-body">${node.body}</p>
    ${node.hint ? `<div class="hint-box">${node.hint}</div>` : ""}
    <button class="btn-primary" onclick="goTo('${node.next}')">
      Continua →
    </button>
    ${history.length > 1 ? `<button class="btn-sm" style="width:100%;margin-top:10px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

/* ──────────────────────────────────────────────────────────────
   QUESTION NODE
   ────────────────────────────────────────────────────────────── */
function renderQuestion(node) {
  const card = document.createElement("div");
  card.className = "card";
  const opts = node.options.map(o => `
    <button class="option-btn" onclick="goTo('${o.next}')">
      <div class="option-label">${o.label}</div>
      ${o.desc ? `<div class="option-desc">${o.desc}</div>` : ""}
    </button>
  `).join("");
  card.innerHTML = `
    <span class="card-icon">${node.icon || "🔀"}</span>
    <h1 class="card-title">${node.title}</h1>
    <p class="card-body">${node.body}</p>
    <div class="options-grid">${opts}</div>
    ${history.length > 1 ? `<button class="btn-sm" style="width:100%;margin-top:14px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

/* ──────────────────────────────────────────────────────────────
   SCORE NODE
   ────────────────────────────────────────────────────────────── */
function renderScore(node) {
  const nid = node.id;
  if (!scores[nid]) scores[nid] = { items: {}, total: 0, interpIdx: 0 };
  const state = scores[nid];

  const card = document.createElement("div");
  card.className = "card";

  // Interpretation tabs (only if multiple interpretations)
  let interpTabsHtml = "";
  if (node.interpretation && node.interpretation.length > 1) {
    interpTabsHtml = `<div class="interp-tabs">` +
      node.interpretation.map((interp, i) =>
        `<button class="interp-tab${i === state.interpIdx ? " active" : ""}"
          onclick="setInterpIdx('${nid}', ${i})">${interp.label}</button>`
      ).join("") + `</div>`;
  }

  // Checklist
  const isPERC = (node.scoreType === "perc");
  const checkItems = node.items.map(item => {
    const checked = !!state.items[item.id];
    const pts = isPERC ? "" : `<span class="check-pts">+${item.points}</span>`;
    return `
      <div class="check-item${checked ? " checked" : ""}" onclick="toggleItem('${nid}','${item.id}',${item.points})">
        <div class="check-box">${checked ? "✓" : ""}</div>
        <span class="check-label">${item.label}</span>
        ${pts}
      </div>
    `;
  }).join("");

  // D-Dimer input
  let ddimerHtml = "";
  if (node.ddimer_input) {
    const dd = ddimers[nid] || {};
    const age = dd.age || "";
    const val = dd.value !== undefined ? dd.value : "";
    const ageThreshold = age >= 50 ? `Soglia age-adjusted: ${age * 10} µg/L` :
                         age > 0   ? `Soglia standard: 500 µg/L` : "";
    ddimerHtml = `
      <div class="ddimer-group">
        <label class="ddimer-label">Età paziente (per soglia age-adjusted)</label>
        <div class="age-row">
          <input class="age-input" type="number" min="18" max="110" placeholder="anni"
            value="${age}"
            oninput="setDdimer('${nid}','age', this.value)"
          />
          ${ageThreshold ? `<span class="age-threshold">⟹ ${ageThreshold}</span>` : ""}
        </div>
        <label class="ddimer-label">Valore D-Dimero</label>
        <div class="ddimer-row">
          <input class="ddimer-input" type="number" min="0" placeholder="es. 450"
            value="${val}"
            oninput="setDdimer('${nid}','value', this.value)"
          />
          <span class="ddimer-unit">ng/mL (µg/L)</span>
        </div>
        ${node.hint_age_adjusted ? `<div class="ddimer-hint">ℹ ${node.hint_age_adjusted}</div>` : ""}
      </div>
    `;
  }

  // Current interpretation
  const currentInterp = node.interpretation ? node.interpretation[state.interpIdx] : null;
  let interpResultHtml = "";
  if (currentInterp) {
    const result = getScoreResult(node, state, nid);
    if (result) {
      const colors = { "safe": "#3fb950", "warning": "#d29922", "danger": "#f85149" };
      const sev = result.next === "result_very_low_prob" || result.next === "result_pe_excluded" ? "safe" :
                  result.next === "diagnostic_imaging_direct" ? "danger" : "warning";
      interpResultHtml = `
        <div class="result-banner banner-${sev}" style="margin-top:4px">
          <span>${sev === "safe" ? "✅" : sev === "danger" ? "⚠️" : "🔶"}</span>
          <span>${result.category}</span>
        </div>
      `;
    }
  }

  card.innerHTML = `
    <span class="card-icon">${node.icon || "📋"}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    ${node.description ? `<div class="score-description">${node.description}</div>` : ""}
    ${interpTabsHtml}
    <div class="checklist">${checkItems}</div>
    <div class="score-total">
      <span class="score-total-label">
        ${isPERC ? "Criteri positivi (fattori di rischio presenti)" : "Punteggio totale"}
      </span>
      <span class="score-total-value">${state.total}</span>
    </div>
    ${ddimerHtml}
    ${interpResultHtml}
    <button class="btn-primary" id="continue-btn-${nid}" onclick="submitScore('${nid}')"
      style="${canSubmit(node, state, nid) ? '' : 'opacity:.4;cursor:not-allowed'}">
      Conferma e Continua →
    </button>
    ${history.length > 1 ? `<button class="btn-sm" style="width:100%;margin-top:10px" onclick="goBack()">← Indietro</button>` : ""}
  `;
  return card;
}

function toggleItem(nid, itemId, pts) {
  const s = scores[nid];
  if (s.items[itemId]) {
    delete s.items[itemId];
    s.total = Math.max(0, s.total - pts);
  } else {
    s.items[itemId] = true;
    s.total += pts;
  }
  render(history[history.length - 1]);
}

function setInterpIdx(nid, idx) {
  scores[nid].interpIdx = idx;
  render(history[history.length - 1]);
}

function setDdimer(nid, field, val) {
  if (!ddimers[nid]) ddimers[nid] = {};
  ddimers[nid][field] = parseFloat(val) || 0;
  render(history[history.length - 1]);
}

function canSubmit(node, state, nid) {
  if (node.ddimer_input) {
    const dd = ddimers[nid] || {};
    return dd.value !== undefined && dd.value >= 0 && dd.age > 0;
  }
  return true;
}

function getScoreResult(node, state, nid) {
  const currentInterp = node.interpretation[state.interpIdx];
  if (!currentInterp) return null;

  if (node.scoreType === "years") {
    const dd = ddimers[nid] || {};
    const dval = dd.value || 0;
    const age  = dd.age  || 0;
    const yearsCount = state.total;

    // Compute age-adjusted threshold
    const ageThreshold = age > 0 ? (age < 50 ? 500 : age * 10) : 500;

    for (const rule of currentInterp.rules) {
      const yearsOk = (rule.years === 0 && yearsCount === 0) ||
                      (rule.years === ">=1" && yearsCount >= 1);
      if (!yearsOk) continue;

      let threshold = rule.ddimer_val;
      // For the age-adjusted rules (500 ng/mL rules), also check age-adjusted
      if (rule.ddimer_val === 500) {
        // Use the lower of the two (500 or age-adjusted)
        threshold = Math.min(500, ageThreshold);
      }

      const ddOk = (rule.ddimer_op === "<"  && dval < threshold)  ||
                   (rule.ddimer_op === ">=" && dval >= threshold);
      if (ddOk) return rule;
    }
    return null;
  }

  // Standard range matching
  for (const rule of currentInterp.rules) {
    if (state.total >= rule.range[0] && state.total <= rule.range[1]) {
      return rule;
    }
  }
  return null;
}

function submitScore(nid) {
  const node = PE_DECISION_TREE[nid];
  const state = scores[nid];
  if (!canSubmit(node, state, nid)) return;

  const result = getScoreResult(node, state, nid);
  if (!result) {
    alert("Completa tutti i campi richiesti per procedere.");
    return;
  }
  goTo(result.next);
}

/* ──────────────────────────────────────────────────────────────
   RESULT NODE
   ────────────────────────────────────────────────────────────── */
function renderResult(node) {
  const card = document.createElement("div");
  card.className = `card result-${node.severity}`;

  const bannerText = {
    safe:    "Probabilità molto bassa / PE esclusa",
    warning: "Test necessari – procedere con imaging",
    danger:  "Alta probabilità – eseguire imaging urgente"
  };

  const recoHtml = node.recommendations ? `
    <div class="reco-list">
      ${node.recommendations.map(r => `
        <div class="reco-item${r.primary ? " primary" : ""}">
          <div class="reco-dot ${r.primary ? "dot-primary" : "dot-alt"}"></div>
          <div>
            <div class="reco-name">${r.text}</div>
            <div class="reco-desc">${r.desc}</div>
          </div>
        </div>
      `).join("")}
    </div>
  ` : "";

  const echoHtml = node.echo_table ? `
    <div class="echo-section">
      <button class="echo-toggle" onclick="toggleEcho(this)">
        ▸ Tabella Ecocardiografia – Disfunzione RV (se PE confermata)
      </button>
      <div class="echo-table-wrap" style="display:none">
        <table>
          <thead>
            <tr>
              <th>Parametro</th>
              <th>Tecnica</th>
              <th>Definizione</th>
            </tr>
          </thead>
          <tbody>
            ${ECHO_RV_TABLE.map(r => `
              <tr>
                <td><strong>${r.parameter}</strong></td>
                <td>${r.technique}</td>
                <td>${r.definition}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  ` : "";

  const noteHtml = node.note ? `<div class="note-box">${node.note}</div>` : "";

  card.innerHTML = `
    ${corBadge(node.cor, node.cor_color)}
    <span class="card-icon">${node.icon || ""}</span>
    <h1 class="card-title">${node.title}</h1>
    ${node.subtitle ? `<p class="card-subtitle">${node.subtitle}</p>` : ""}
    <div class="result-banner banner-${node.severity}">
      <span>${node.severity === "safe" ? "✅" : node.severity === "danger" ? "🔴" : "🟡"}</span>
      <span>${bannerText[node.severity]}</span>
    </div>
    <p class="card-body">${node.body}</p>
    ${recoHtml}
    ${echoHtml}
    ${noteHtml}
    <div class="disclaimer">
      ${TREE_METADATA.disclaimer}<br>
      <strong>Fonte:</strong> ${TREE_METADATA.source} · ${TREE_METADATA.author}
    </div>
    <button class="btn-primary" style="margin-top:18px;background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="resetApp()">
      ↺ Nuova Valutazione
    </button>
    <button class="btn-sm" style="width:100%;margin-top:10px" onclick="goBack()">← Indietro</button>
  `;
  return card;
}

function toggleEcho(btn) {
  const wrap = btn.nextElementSibling;
  const open = wrap.style.display !== "none";
  wrap.style.display = open ? "none" : "block";
  btn.textContent = (open ? "▸" : "▾") + " Tabella Ecocardiografia – Disfunzione RV (se PE confermata)";
}

/* ──────────────────────────────────────────────────────────────
   BOOT
   ────────────────────────────────────────────────────────────── */
goTo("start");
</script>
</body>
</html>
